<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SIMPRO – Sejarah Distribusi</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
</head>
<body>

<!-- NAV -->
<nav id="navbar">
  <div class="nav-logo">
    <img src="img/logo-simpro-sejarahdistribusi.png" alt="SIMPRO" height="32"/>
    <span>SIMPRO</span>
  </div>

  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <ul class="nav-links" id="navLinks">
    <li><a href="../dashboard/index.html">Beranda</a></li>
    <li><a href="../produksi/index.html">Produksi</a></li>
    <li><a href="#" class="nav-active">Distribusi</a></li>
    <li><a href="../keuntungan/index.html">Laporan Keuntungan</a></li>
  </ul>

  <div class="nav-right" id="navRight">
    <button class="btn-icon" aria-label="Profil">
      <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
        <circle cx="19" cy="19" r="18" stroke="#A64B4B" stroke-width="1.5" fill="#f2e8e8"/>
        <circle cx="19" cy="15" r="5" stroke="#A64B4B" stroke-width="1.5" fill="none"/>
        <path d="M8 32c0-6 5-10 11-10s11 4 11 10" stroke="#A64B4B" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>
    </button>
    <button class="btn-keluar" onclick="window.location.href='../login/index.html'">Keluar</button>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Sejarah Distribusi</h1>
  <button class="btn-buat" onclick="window.location.href='../distribusi/tambah/tambah.html'">Buat Distribusi Baru</button>
</div>

<!-- MAIN -->
<main>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Tanggal Distribusi</th>
          <th>Pelanggan</th>
          <th>Tanggal Produksi</th>
          <th>Jumlah</th>
          <th></th>
          <th>Status</th>
          
        </tr>
      </thead>
      <tbody id="distribusiTableBody"></tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>

</main>

<footer>SIMPRO v1.0 © 2026</footer>

<!-- Modal Edit Distribusi -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Edit Distribusi</h3>
    <label for="editPelanggan">Pelanggan</label>
    <input type="text" id="editPelanggan"/>
    <label for="editJumlah">Jumlah</label>
    <input type="number" id="editJumlah" min="0" placeholder="0"/>
    <label for="editStatus">Status</label>
    <select id="editStatus">
      <option value="Dikirim">Dikirim</option>
      <option value="Selesai">Selesai</option>
      <option value="Pending">Pending</option>
      <option value="Dibatalkan">Dibatalkan</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-save" onclick="saveEdit()">Simpan</button>
    </div>
  </div>
</div>

<!-- Modal Buat Distribusi Baru -->
<div class="modal-overlay" id="modalBuat">
  <div class="modal">
    <h3>Buat Distribusi Baru</h3>
    <label for="buatTanggal">Tanggal Distribusi</label>
    <input type="date" id="buatTanggal"/>
    <label for="buatPelanggan">Pelanggan</label>
    <input type="text" id="buatPelanggan" placeholder="Nama pelanggan"/>
    <label for="buatTanggalProd">Tanggal Produksi</label>
    <input type="date" id="buatTanggalProd"/>
    <label for="buatJumlah">Jumlah</label>
    <input type="number" id="buatJumlah" min="0" placeholder="0"/>
    <label for="buatStatus">Status</label>
    <select id="buatStatus">
      <option value="Pending">Pending</option>
      <option value="Dikirim">Dikirim</option>
      <option value="Selesai">Selesai</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeBuat()">Batal</button>
      <button class="btn-save" onclick="simpanBuat()">Simpan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
