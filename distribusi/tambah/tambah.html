<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tambah Distribusi – SIMPRO</title>

  <script src="../../shared.js"></script>
  <script>
    // Seragamkan font Tailwind dengan halaman lain (DM Sans + Playfair Display)
    window.tailwind = { config: {
      theme: {
        extend: {
          fontFamily: {
            sans   : ["'DM Sans'", 'sans-serif'],
            display: ["'Playfair Display'", 'serif'],
          }
        }
      }
    }};
  </script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
</head>

<body class="min-h-screen">

  <!-- NAVBAR -->
<nav id="navbar">
  <div class="nav-logo">
    <img src="assets/logo-simpro.png" alt="SIMPRO" class="logo-img" />
    <span>SIMPRO</span>
  </div>

  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <ul class="nav-links" id="navLinks">
    <li><a href="../../dashboard/index.html">Beranda</a></li>
    <li><a href="../../produksi/index.html">Produksi</a></li>
    <li><a href="../../stok-produksi/index.html" class="nav-active">Distribusi</a></li>
    <li><a href="../../keuntungan/index.html">Laporan Keuntungan</a></li>
  </ul>

  <div class="nav-right" id="navRight">
    <button class="btn-icon" aria-label="Profil">
      <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
        <circle cx="19" cy="19" r="18" stroke="#A64B4B" stroke-width="1.5" fill="#f2e8e8"/>
        <circle cx="19" cy="15" r="5" stroke="#A64B4B" stroke-width="1.5" fill="none"/>
        <path d="M8 32c0-6 5-10 11-10s11 4 11 10" stroke="#A64B4B" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>
    </button>
    <button class="btn-keluar" onclick="window.location.href='../../login/index.html'">Keluar</button>
  </div>
</nav>

  <!-- HERO -->
  <div class="hero-header py-10 text-center">
    <h1 class="text-4xl mb-5 hero-title">
      Tambah Distribusi
    </h1>

    <button onclick="window.location.href='../../sejarah-distribusi/index.html'" class="btn-marun">
  Kembali
</button>
  </div>

  <!-- MAIN -->
  <main class="max-w-3xl mx-auto px-4 py-8">

    <!-- DATA PELANGGAN -->
    <div class="section-card">
      <h2 class="text-2xl mb-6 section-title">
        Data Pelanggan
      </h2>

      <div class="grid gap-5">

        <div class="grid md:grid-cols-2 items-center gap-3">
          <label for="nama" class="norm">Nama Pelanggan</label>
          <input id="nama" required class="field-input" type="text" title="Nama Pelanggan" placeholder="Masukkan nama pelanggan" />
        </div>

        <div class="grid md:grid-cols-2 items-center gap-3">
          <label for="telp_pelanggan" class="req">Nomor Telepon Pelanggan</label>
          <input id="telp_pelanggan" required class="field-input" type="tel" title="Nomor Telepon Pelanggan" placeholder="Masukkan nomor telepon pelanggan" />
        </div>

        <div class="grid md:grid-cols-2 items-center gap-3">
          <label for="no_kendaraan" class="norm">Nomor Kendaraan</label>
          <input id="no_kendaraan" class="field-input" type="text" placeholder="Masukkan nomor kendaraan"/>
        </div>

        <div class="grid md:grid-cols-2 items-center gap-3">
          <label for="telp_kondektur" class="req">Nomor Telepon Kondektur</label>
          <input id="telp_kondektur" required class="field-input" type="tel" title="Nomor Telepon Kondektur" placeholder="Masukkan nomor telepon kondektur"/>
        </div>

        <div class="grid md:grid-cols-2 items-center gap-3">
          <label for="lokasi" class="norm">Lokasi Pengiriman</label>
          <input id="lokasi" class="field-input" type="text" placeholder="Masukkan lokasi pengiriman"/>
        </div>

      </div>
    </div>

    <!-- PRODUK -->
    <div class="section-card">
      <h2 class="text-2xl mb-6 section-title">
        Produk & Stok
      </h2>

      <div class="grid gap-5">

        <div class="grid md:grid-cols-2 items-center gap-3">
          <label for="produk" class="norm">Produk</label>
          <select id="produk" class="field-input" onchange="handleProdukChange()">
            <option value="" disabled selected>Pilihan Produk</option>
            <option value="tahu_bulat_cimol">Tahu Bulat Cimol</option>
            <option value="tahu_bulat_standar">Tahu Bulat Standar</option>
            <option value="tahu_bulat_jumbo">Tahu Bulat Jumbo</option>
            <option value="sotong">Sotong</option>
          </select>
        </div>

        <div class="grid md:grid-cols-2 items-center gap-3">
          <label for="tgl_produksi" class="norm">Tanggal Produksi</label>
          <select id="tgl_produksi" class="field-input" title="Pilih tanggal produksi" onchange="handleTanggalChange()">
            <option value="" disabled selected>Pilihan Tanggal Produksi</option>
          </select>
          <p id="stok-info"></p>
        </div>

        <!-- TANGGAL KADALUARSA -->
        <div class="grid md:grid-cols-2 items-center gap-3">
          <label class="req">Perkiraan Tanggal Kadaluarsa</label>
          <input 
            id="kadaluarsa"
            class="field-input field-readonly"
            placeholder="DD/MM/YY (dihitung otomatis)"
            readonly
          />
        </div>

        <div class="grid md:grid-cols-2 items-center gap-3">
        <label class="norm">Jumlah Dikirim</label>
        <input 
          id="jumlah"
          type="number"
          class="field-input"
          placeholder="Masukkan jumlah dikirim (pastikan tidak melebihi stok)"
          oninput="hitungTotal()"
        />
        </div>

        <!-- TOTAL HARGA -->
        <div class="grid md:grid-cols-2 items-center gap-3">
          <label class="req">Perkiraan Harga Total Produksi</label>
          <input 
            id="total"
            class="field-input field-readonly"
            placeholder="RpXXX.XXX (dihitung otomatis)"
            readonly
          />
        </div>

      </div>
    </div>

    <!-- BUTTON -->
    <div class="flex justify-center gap-4 pb-10">
      <button onclick="simpanData()" class="btn-marun px-8 py-2">
        Simpan
      </button>

      <button onclick="resetForm()" class="btn-outline px-8 py-2">
        Reset
      </button>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="footer text-center text-xs py-5">
    SIMPRO v1.0 © 2026
  </footer>

  <!-- ✅ TOAST FIX -->
  <div id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
